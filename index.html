<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>French Listening Trainer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="app-panel">
        <header class="top-bar">
          <div>
            <p class="eyebrow" id="lessonLevel">Level 1</p>
            <h1 id="lessonTitle">French Listening Trainer</h1>
          </div>
        </header>

        <section class="lesson-panel">
          <div class="lesson-panel-header">
            <label>Lessons</label>
            <div class="lesson-actions">
              <button id="selectAllLessons" type="button">All</button>
              <button id="selectFirstLesson" type="button">First only</button>
            </div>
          </div>
          <div class="lesson-toggle-list" id="lessonToggleList" aria-label="Lessons"></div>
        </section>

        <section class="player-panel">
          <div class="player-top">
            <div>
              <p class="category">Player</p>
              <h2 id="playerTitle">Sentences</h2>
              <p id="playStatus">Choose words or sentences, then press Play all.</p>
            </div>
            <div class="mode-toggle" role="group" aria-label="Item type">
              <button class="active" data-player-mode="sentences" type="button">Sentences</button>
              <button data-player-mode="words" type="button">Words</button>
            </div>
          </div>

          <div class="player-controls">
            <label>
              <span>French repeats</span>
              <select id="repeatCount">
                <option value="1">1 time</option>
                <option value="2" selected>2 times</option>
                <option value="3">3 times</option>
                <option value="5">5 times</option>
              </select>
            </label>
            <label>
              <span>French speed</span>
              <select id="frSpeed">
                <option value="0.75">Slow</option>
                <option value="0.9">Easy</option>
                <option value="1" selected>Normal</option>
                <option value="1.15">Fast</option>
              </select>
            </label>
            <label>
              <span>French voice</span>
              <select id="voiceSelect"></select>
            </label>
            <label class="loop-control">
              <input id="loopPlayback" type="checkbox" />
              <span>Loop</span>
            </label>
          </div>

          <div class="player-actions">
            <button class="icon-button primary" id="playAll" type="button">
              <span aria-hidden="true">▶</span>
              Play all
            </button>
            <button id="stopPlayback" type="button">Stop</button>
            <button id="shuffleItems" type="button">Shuffle</button>
          </div>

          <p class="speech-note" id="speechNote" hidden>Speech is not available in this browser.</p>
          <div class="audio-meta">
            <p id="voiceStatus">Lesson MP3 audio is active.</p>
            <p id="audioStatus">No browser speech fallback. Audio is AI-generated.</p>
          </div>

          <div class="item-list" id="itemList"></div>
        </section>
      </section>
    </main>

    <script src="lessons/bundle.js"></script>
    <script src="app.js?v=11"></script>
  </body>
</html>
